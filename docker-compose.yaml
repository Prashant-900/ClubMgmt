version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clubmgmt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clubmgmt
      POSTGRES_PASSWORD: clubmgmt
      POSTGRES_DB: clubmgmt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clubmgmt"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
